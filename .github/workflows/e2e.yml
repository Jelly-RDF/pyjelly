name: e2e-tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  PY_COLORS: 1

defaults:
  run:
    shell: bash

jobs:
  e2e-tests:
    name: ${{ matrix.version }} ${{matrix.platform}}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        version:
          - "3.13"
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      uv-sync: uv sync --frozen --python ${{matrix.version}} --only-group ci-e2e-tests
      uv-run: uv run --no-sync --frozen --python ${{matrix.version}}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install latest Jelly CLI
        id: install-cli
        run: ./download-cli
  
      - name: Install pyjelly
        id: install-pyjelly
        run: ${{ env.uv-sync }}
